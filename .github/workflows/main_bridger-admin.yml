name: Build and deploy admin to Azure - bridger-admin

on:
  push:
    branches: [main]
    paths:
      - 'espace-admin/**'
      - '.github/workflows/main_bridger-admin.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Build admin
        working-directory: ./espace-admin
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://bridger-api.azurewebsites.net

      - name: Bundle static server
        working-directory: ./espace-admin/dist
        run: |
          cat > package.json <<'EOF'
          {
            "name": "bridger-admin",
            "version": "1.0.0",
            "scripts": { "start": "serve -s . -l 8080" },
            "dependencies": { "serve": "^14.2.4" }
          }
          EOF
          npm install --omit=dev

      - name: Zip artifact
        working-directory: ./espace-admin/dist
        run: zip -r ../../release.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: admin-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: admin-app
      - run: unzip release.zip
      - uses: azure/webapps-deploy@v3
        with:
          app-name: bridger-admin
          slot-name: production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_ADMIN }}
