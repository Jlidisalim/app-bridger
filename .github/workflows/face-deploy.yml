name: Deploy Face Verification to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'face-verification-service/**'
      - '.github/workflows/face-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af
          df -h
      
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: bridgeracr29792.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./face-verification-service
          file: ./face-verification-service/Dockerfile
          push: true
          tags: bridgeracr29792.azurecr.io/bridger-face:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Configure Web App for Container
        run: |
          az webapp config container set \
            --name bridger-face \
            --resource-group bridger-prod \
            --container-image-name "bridgeracr29792.azurecr.io/bridger-face:v1" \
            --container-registry-url "https://bridgeracr29792.azurecr.io" \
            --container-registry-user "${{ secrets.ACR_USERNAME }}" \
            --container-registry-password "${{ secrets.ACR_PASSWORD }}"
      
      - name: Set Web App Settings
        run: |
          az webapp config appsettings set \
            --name bridger-face \
            --resource-group bridger-prod \
            --settings \
              WEBSITES_PORT=8000 \
              PORT=8000 \
              PYTHONUNBUFFERED=1 \
              WEBSITES_CONTAINER_START_TIME_LIMIT=1800 \
              INTERNAL_API_SECRET=2bb61ae001efa97735128dbdc1a4df61a52cae58d2aa535d3ff760ad075e87b4
      
      - name: Restart Web App
        run: |
          az webapp restart --name bridger-face --resource-group bridger-prod
      
      - name: Logout from Azure
        run: az logout
        if: always()
